<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DataCash – Transaction History</title>
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #080f1e;
      --card: #0d1b30;
      --card2: #0a1628;
      --border: #1a2d4a;
      --blue: #2d7aed;
      --blue-hover: #1a68d9;
      --muted: #8a9ab5;
      --text: #fff;
      --dark-input: #060d1a;
      --red: #ef4444;
      --green: #22c55e;
      --gold: #f5c842;
      --orange: #f97316;
    }

    body {
      min-height: 100vh;
      background-color: var(--bg);
      font-family: 'Segoe UI', Arial, sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 20px 16px 80px;
    }

    /* ── Topbar ── */
    .topbar {
      width: 100%;
      max-width: 520px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .btn-back {
      width: 42px;
      height: 42px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      color: #fff;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: background .2s;
    }
    .btn-back:hover {
      background: #1a2d4a;
    }
    .topbar h2 {
      font-size: 20px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .topbar-right {
      width: 42px;
    }

    /* ── Filter Tabs ── */
    .filter-tabs {
      width: 100%;
      max-width: 520px;
      display: flex;
      gap: 6px;
      margin-bottom: 18px;
      overflow-x: auto;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
    }
    .filter-tabs::-webkit-scrollbar {
      height: 0;
    }
    .filter-tab {
      padding: 8px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all .2s;
      flex-shrink: 0;
    }
    .filter-tab:hover {
      border-color: var(--blue);
      color: #fff;
    }
    .filter-tab.active {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    /* ── Summary Cards ── */
    .summary-row {
      width: 100%;
      max-width: 520px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 18px;
    }
    .summary-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 12px;
      text-align: center;
    }
    .summary-card .sc-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.8px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .summary-card .sc-value {
      font-size: 17px;
      font-weight: 800;
    }
    .summary-card .sc-value.green {
      color: var(--green);
    }
    .summary-card .sc-value.red {
      color: var(--red);
    }
    .summary-card .sc-value.blue {
      color: var(--blue);
    }

    /* ── Transaction List ── */
    .tx-list {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .tx-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color .2s;
      cursor: default;
    }
    .tx-card:hover {
      border-color: #253d5e;
    }
    .tx-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .tx-icon.deposit {
      background: rgba(34, 197, 94, 0.15);
      color: var(--green);
    }
    .tx-icon.withdrawal {
      background: rgba(239, 68, 68, 0.15);
      color: var(--red);
    }
    .tx-icon.data {
      background: rgba(45, 122, 237, 0.15);
      color: var(--blue);
    }
    .tx-icon.referral {
      background: rgba(245, 200, 66, 0.15);
      color: var(--gold);
    }
    .tx-icon.other {
      background: rgba(139, 154, 181, 0.15);
      color: var(--muted);
    }
    .tx-info {
      flex: 1;
      min-width: 0;
    }
    .tx-info .tx-type {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      text-transform: capitalize;
    }
    .tx-info .tx-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .tx-info .tx-meta span {
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .tx-amount {
      text-align: right;
      flex-shrink: 0;
    }
    .tx-amount .amt {
      font-size: 16px;
      font-weight: 700;
    }
    .tx-amount .amt.positive {
      color: var(--green);
    }
    .tx-amount .amt.negative {
      color: var(--red);
    }
    .tx-amount .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 50px;
      font-size: 10px;
      font-weight: 600;
      margin-top: 4px;
    }
    .badge.completed {
      background: rgba(34, 197, 94, 0.15);
      color: var(--green);
    }
    .badge.pending {
      background: rgba(245, 200, 66, 0.15);
      color: var(--gold);
    }
    .badge.initiated {
      background: rgba(45, 122, 237, 0.15);
      color: var(--blue);
    }
    .badge.failed {
      background: rgba(239, 68, 68, 0.15);
      color: var(--red);
    }

    /* ── Empty State ── */
    .empty-state {
      text-align: center;
      padding: 50px 20px;
      color: var(--muted);
    }
    .empty-state .empty-icon {
      font-size: 56px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    .empty-state h3 {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }
    .empty-state p {
      font-size: 13px;
      color: var(--muted);
      max-width: 280px;
      margin: 0 auto;
    }

    /* ── Loading ── */
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255, 255, 255, .1);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 50px auto;
    }
    .loading-text {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      margin-top: 12px;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 26px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a2d4a;
      color: #fff;
      padding: 12px 22px;
      border-radius: 10px;
      font-size: 13.5px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, .5);
      transition: transform .35s cubic-bezier(.34, 1.56, .64, 1), opacity .35s;
      opacity: 0;
      z-index: 999;
      text-align: center;
      max-width: 320px;
      width: 90%;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .toast.error {
      border-left: 4px solid #ef4444;
    }
    .toast.info {
      border-left: 4px solid var(--blue);
    }

    @media (max-width: 480px) {
      .summary-row {
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
      }
      .summary-card {
        padding: 12px 8px;
      }
      .summary-card .sc-value {
        font-size: 15px;
      }
      .tx-card {
        padding: 14px 12px;
        gap: 10px;
      }
      .tx-icon {
        width: 38px;
        height: 38px;
        font-size: 16px;
      }
      .tx-amount .amt {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>

  <!-- Topbar -->
  <div class="topbar">
    <a href="dashboard.html" class="btn-back" aria-label="Back to dashboard">←</a>
    <h2>📋 History</h2>
    <div class="topbar-right"></div>
  </div>

  <!-- Filter Tabs -->
  <div class="filter-tabs" id="filterTabs">
    <button class="filter-tab active" data-filter="all">All</button>
    <button class="filter-tab" data-filter="Deposit">↓ Deposits</button>
    <button class="filter-tab" data-filter="Withdrawal">↑ Withdrawals</button>
    <button class="filter-tab" data-filter="Data">🎁 Data</button>
    <button class="filter-tab" data-filter="Referral">👥 Referrals</button>
  </div>

  <!-- Summary Cards -->
  <div class="summary-row">
    <div class="summary-card">
      <div class="sc-label">Deposits</div>
      <div class="sc-value green" id="totalDeposits">₦0</div>
    </div>
    <div class="summary-card">
      <div class="sc-label">Withdrawals</div>
      <div class="sc-value red" id="totalWithdrawals">₦0</div>
    </div>
    <div class="summary-card">
      <div class="sc-label">Data</div>
      <div class="sc-value blue" id="totalData">0 MB</div>
    </div>
  </div>

  <!-- Transaction List -->
  <div class="tx-list" id="txList">
    <div class="spinner" id="loadingSpinner"></div>
    <p class="loading-text" id="loadingText">Loading transactions…</p>
  </div>

  <!-- Empty State (hidden by default) -->
  <div class="empty-state hidden" id="emptyState">
    <div class="empty-icon">📭</div>
    <h3>No transactions yet</h3>
    <p>Your deposits, withdrawals, data purchases and referrals will appear here.</p>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore, collection, query, where, orderBy, limit, getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // ─── Firebase Config ──────────────────────────────────
    const app = initializeApp({
      apiKey: "AIzaSyBTkls-WbffHErGeX9bMYPpV5pqbCe14gY",
      authDomain: "datacash-104dd.firebaseapp.com",
      projectId: "datacash-104dd",
      storageBucket: "datacash-104dd.firebasestorage.app",
      messagingSenderId: "101692098149",
      appId: "1:101692098149:web:55ccc9f1f105647488a88c"
    });

    const auth = getAuth(app);
    const db = getFirestore(app);

    let allTransactions = [];
    let currentFilter = 'all';

    // ─── Toast ────────────────────────────────────────────
    function toast(msg, type = 'info') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = `toast ${type} show`;
      clearTimeout(el._t);
      el._t = setTimeout(() => { el.className = 'toast'; }, 4000);
    }

    // ─── Format helpers ────────────────────────────────────
    function fmt(n) {
      return Number(n || 0).toLocaleString("en-NG");
    }

    function fmtDate(ts) {
      if (!ts) return "–";
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      const now = new Date();
      const diff = now - d;
      const mins = Math.floor(diff / 60000);
      const hours = Math.floor(diff / 3600000);
      const days = Math.floor(diff / 86400000);

      if (mins < 1) return "Just now";
      if (mins < 60) return `${mins}m ago`;
      if (hours < 24) return `${hours}h ago`;
      if (days < 7) return `${days}d ago`;
      return d.toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" });
    }

    function getIconClass(type) {
      const t = (type || "").toLowerCase();
      if (t === "deposit") return "deposit";
      if (t === "withdrawal") return "withdrawal";
      if (t === "data" || t === "data purchase" || t === "redeem data") return "data";
      if (t === "referral" || t === "referral bonus" || t === "referral earning") return "referral";
      return "other";
    }

    function getIconEmoji(type) {
      const t = (type || "").toLowerCase();
      if (t === "deposit") return "↓";
      if (t === "withdrawal") return "↑";
      if (t === "data" || t === "data purchase" || t === "redeem data") return "🎁";
      if (t === "referral" || t === "referral bonus" || t === "referral earning") return "👥";
      return "•";
    }

    function getBadgeClass(status) {
      const s = (status || "").toLowerCase();
      if (s === "success" || s === "completed" || s === "approved") return "completed";
      if (s === "pending" || s === "processing") return "pending";
      if (s === "initiated" || s === "submitted") return "initiated";
      if (s === "failed" || s === "rejected") return "failed";
      return "initiated";
    }

    function isPositive(type) {
      const t = (type || "").toLowerCase();
      return ["deposit", "referral", "referral bonus", "referral earning", "data"].includes(t);
    }

    // ─── Render transactions ──────────────────────────────
    function renderTransactions(filter = 'all') {
      const txList = document.getElementById('txList');
      const emptyState = document.getElementById('emptyState');

      let filtered = allTransactions;
      if (filter !== 'all') {
        filtered = allTransactions.filter(tx => {
          const type = (tx.type || "").toLowerCase();
          const filterLower = filter.toLowerCase();
          if (filterLower === "data") return type === "data" || type === "data purchase" || type === "redeem data";
          if (filterLower === "referral") return type === "referral" || type === "referral bonus" || type === "referral earning";
          return type === filterLower;
        });
      }

      if (filtered.length === 0) {
        txList.innerHTML = '';
        txList.classList.add('hidden');
        emptyState.classList.remove('hidden');
      } else {
        emptyState.classList.add('hidden');
        txList.classList.remove('hidden');

        txList.innerHTML = filtered.map(tx => {
          const isPos = isPositive(tx.type);
          const sign = isPos ? '+' : '-';
          const colorClass = isPos ? 'positive' : 'negative';
          const iconClass = getIconClass(tx.type);
          const iconEmoji = getIconEmoji(tx.type);
          const badgeClass = getBadgeClass(tx.status);
          const statusLabel = tx.status || 'Initiated';

          let metaHtml = '';
          if (tx.method) metaHtml += `<span>💳 ${tx.method}</span>`;
          if (tx.bankName) metaHtml += `<span>🏦 ${tx.bankName}</span>`;
          if (tx.dataAmount) metaHtml += `<span>📱 ${tx.dataAmount}MB</span>`;
          if (tx.network) metaHtml += `<span>📶 ${tx.network}</span>`;

          return `
            <div class="tx-card">
              <div class="tx-icon ${iconClass}">${iconEmoji}</div>
              <div class="tx-info">
                <div class="tx-type">${tx.type || "Transaction"}</div>
                <div class="tx-meta">
                  <span>📅 ${fmtDate(tx.createdAt)}</span>
                  ${metaHtml}
                </div>
              </div>
              <div class="tx-amount">
                <div class="amt ${colorClass}">${sign}₦${fmt(tx.amount)}</div>
                <span class="badge ${badgeClass}">${statusLabel}</span>
              </div>
            </div>`;
        }).join('');
      }

      // Update summary cards
      updateSummary();
    }

    // ─── Update summary cards ─────────────────────────────
    function updateSummary() {
      let totalDep = 0;
      let totalWith = 0;
      let totalDataMB = 0;

      allTransactions.forEach(tx => {
        const type = (tx.type || "").toLowerCase();
        if (type === "deposit") totalDep += (tx.amount || 0);
        if (type === "withdrawal") totalWith += (tx.amount || 0);
        if (type === "data" || type === "data purchase" || type === "redeem data") {
          totalDataMB += (tx.dataAmount || 0);
        }
      });

      document.getElementById('totalDeposits').textContent = `₦${fmt(totalDep)}`;
      document.getElementById('totalWithdrawals').textContent = `₦${fmt(totalWith)}`;
      document.getElementById('totalData').textContent = `${fmt(totalDataMB)} MB`;
    }

    // ─── Fetch transactions ────────────────────────────────
    async function fetchTransactions(uid) {
      try {
        const txRef = collection(db, "transactions");
        const q = query(
          txRef,
          where("uid", "==", uid),
          limit(100)
        );
        const txSnap = await getDocs(q);

        const rows = [];
        txSnap.forEach(d => rows.push({ id: d.id, ...d.data() }));

        // Sort client-side by createdAt (newest first)
        rows.sort((a, b) => {
          const ta = a.createdAt?.seconds || a.createdAt?.toDate?.()?.getTime() / 1000 || 0;
          const tb = b.createdAt?.seconds || b.createdAt?.toDate?.()?.getTime() / 1000 || 0;
          return tb - ta;
        });

        allTransactions = rows;
        renderTransactions(currentFilter);

      } catch (err) {
        console.error("Failed to fetch transactions:", err);
        toast("Failed to load transactions.", "error");
        document.getElementById('loadingSpinner').style.display = 'none';
        document.getElementById('loadingText').textContent = 'Error loading transactions. Pull to refresh.';
      }
    }

    // ─── Filter tab click ──────────────────────────────────
    document.getElementById('filterTabs').addEventListener('click', function(e) {
      if (e.target.classList.contains('filter-tab')) {
        // Update active state
        this.querySelectorAll('.filter-tab').forEach(tab => tab.classList.remove('active'));
        e.target.classList.add('active');

        currentFilter = e.target.dataset.filter;
        renderTransactions(currentFilter);
      }
    });

    // ─── Auth guard ────────────────────────────────────────
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        toast('Please sign in to view history.', 'error');
        setTimeout(() => window.location.href = 'login.html', 2000);
        return;
      }

      await fetchTransactions(user.uid);
    });
  </script>
</body>
</html>
