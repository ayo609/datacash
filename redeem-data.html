<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redeem Data – DataCash</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0d1b2a;
      --card: #112236;
      --card2: #0d1b2a;
      --border: #1e3450;
      --blue: #2196f3;
      --blue-hover: #1976d2;
      --muted: #8a9bb0;
      --text: #e0e6f0;
      --text-white: #fff;
      --dark-input: #0d1b2a;
      --red: #ef4444;
      --green: #22c55e;
      --gold: #f59e0b;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── TOP NAV ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(30, 52, 80, 0.3);
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .menu-btn {
      background: #1a2c40;
      border: none;
      color: var(--text);
      width: 40px;
      height: 40px;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: background 0.2s;
    }
    .menu-btn:hover {
      background: #1e3450;
    }
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .notif-btn {
      position: relative;
      background: #1a2c40;
      border: none;
      color: var(--text);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: background 0.2s;
    }
    .notif-btn:hover {
      background: #1e3450;
    }
    .avatar-btn {
      background: #1a3a5c;
      border: none;
      color: var(--text);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 0.5px;
      text-decoration: none;
      transition: background 0.2s;
    }
    .avatar-btn:hover {
      background: #1e4a80;
    }

    /* ── PAGE BODY ── */
    .page {
      padding: 24px 18px 100px;
      max-width: 480px;
      margin: 0 auto;
    }

    h1 {
      font-size: 26px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 6px;
    }
    .page-subtitle {
      font-size: 13.5px;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 20px;
    }

    /* ── Data Wallet Balance ── */
    .wallet-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #1a2c40;
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 30px;
      margin-bottom: 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    .wallet-badge .bal {
      color: var(--blue);
      font-weight: 700;
    }

    /* ── HISTORY BUTTON ── */
    .history-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #1a2c40;
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 30px;
      cursor: pointer;
      margin-bottom: 24px;
      transition: background 0.2s;
      text-decoration: none;
    }
    .history-btn:hover {
      background: #1e3450;
    }
    .history-btn svg {
      width: 18px;
      height: 18px;
    }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border-radius: 18px;
      padding: 24px 20px;
      border: 1px solid var(--border);
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
    }
    .card-title {
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }
    .card-desc {
      font-size: 12.5px;
      color: var(--muted);
      line-height: 1.5;
    }
    .phone-icon-btn {
      background: #1a3450;
      border: none;
      color: var(--text);
      width: 42px;
      height: 42px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* ── FORM ── */
    .form-group {
      margin-bottom: 20px;
    }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #c5d0de;
      margin-bottom: 8px;
    }

    /* Phone number field */
    .phone-row {
      display: flex;
      gap: 0;
      background: var(--dark-input);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      transition: border-color 0.2s;
    }
    .phone-row:focus-within {
      border-color: var(--blue);
    }
    .phone-prefix {
      background: #1a2c40;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      padding: 14px 16px;
      border: none;
      white-space: nowrap;
    }
    .phone-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 14px;
      padding: 14px 14px;
      outline: none;
    }
    .phone-input::placeholder {
      color: #4a6080;
    }

    /* Select */
    .select-wrapper {
      position: relative;
    }
    .form-select {
      width: 100%;
      background: var(--dark-input);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 14px;
      padding: 14px 40px 14px 14px;
      border-radius: 12px;
      outline: none;
      appearance: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .form-select:focus {
      border-color: var(--blue);
    }
    .form-select option {
      background: var(--card);
      color: var(--text);
    }
    .form-select.placeholder-active {
      color: #4a6080;
    }
    .select-arrow {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--muted);
    }

    /* Text input */
    .form-input {
      width: 100%;
      background: var(--dark-input);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 14px;
      padding: 14px 14px;
      border-radius: 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input::placeholder {
      color: #4a6080;
    }
    .form-input:focus {
      border-color: var(--blue);
    }

    /* Cost preview */
    .cost-preview {
      background: var(--dark-input);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .cost-preview .cost-label {
      font-size: 13px;
      color: #4a6080;
    }
    .cost-preview .cost-value {
      font-weight: 700;
      font-size: 16px;
      color: var(--green);
    }
    .cost-preview .cost-value.placeholder {
      color: #4a6080;
      font-weight: 400;
      font-size: 14px;
    }

    /* Submit button */
    .submit-btn {
      width: 100%;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      padding: 16px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
    }
    .submit-btn:hover {
      background: var(--blue-hover);
    }
    .submit-btn:active {
      transform: scale(0.98);
    }
    .submit-btn:disabled {
      background: #1a3450;
      color: #4a6080;
      cursor: not-allowed;
    }

    .admin-note {
      text-align: center;
      font-size: 12px;
      color: #4a6080;
      margin-top: 14px;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a2c40;
      color: var(--text);
      padding: 13px 22px;
      border-radius: 30px;
      font-size: 13.5px;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 999;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
      pointer-events: all;
    }
    .toast.success {
      border-left: 4px solid #22c55e;
    }
    .toast.error {
      border-left: 4px solid #ef4444;
    }
    .toast.info {
      border-left: 4px solid var(--blue);
    }

    /* ── HISTORY MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 200;
      align-items: flex-end;
    }
    .modal-overlay.open {
      display: flex;
    }
    .modal-sheet {
      background: var(--card);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      padding: 20px 18px 40px;
    }
    .modal-handle {
      width: 40px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 20px;
    }
    .modal-title {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 16px;
    }
    .history-item {
      background: var(--dark-input);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid var(--border);
    }
    .history-item-left .hi-network {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 2px;
    }
    .history-item-left .hi-phone {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }
    .history-item-right {
      text-align: right;
    }
    .history-item-right .hi-amount {
      font-size: 14px;
      font-weight: 700;
      color: var(--blue);
      margin-bottom: 4px;
    }
    .status-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .status-pending {
      background: #2a1f00;
      color: #f59e0b;
    }
    .status-approved {
      background: #0a2a14;
      color: #22c55e;
    }
    .status-rejected {
      background: #2a0a0a;
      color: #ef4444;
    }
    .empty-history {
      text-align: center;
      padding: 40px 0;
      color: #4a6080;
      font-size: 14px;
    }
    .modal-close-btn {
      width: 100%;
      margin-top: 16px;
      background: #1a2c40;
      color: var(--text);
      border: none;
      border-radius: 12px;
      padding: 13px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .modal-close-btn:hover {
      background: #1e3450;
    }

    /* WhatsApp FAB */
    .wa-fab {
      position: fixed;
      bottom: 24px;
      right: 20px;
      width: 52px;
      height: 52px;
      background: #25d366;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(37, 211, 102, 0.4);
      z-index: 150;
      transition: transform 0.2s;
      text-decoration: none;
    }
    .wa-fab:hover {
      transform: scale(1.08);
    }
    .wa-fab svg {
      width: 28px;
      height: 28px;
      fill: #fff;
    }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Hidden */
    .hidden {
      display: none !important;
    }

    @media (max-width: 480px) {
      .card {
        padding: 20px 14px;
      }
      h1 {
        font-size: 22px;
      }
    }
  </style>
</head>

  <!-- TOP NAV -->
  <div class="topbar">

        <svg width="18" height="14" viewBox="0 0 18 14" fill="none" xmlns="http://www.w3.org/2000/svg">

      </a>

  </div>

  <!-- PAGE -->
  <div class="page">
    <h1>Redeem data</h1>
    <p class="page-subtitle">Redeem from your Free Data Wallet. Requests require admin approval.</p>

    <!-- Data Wallet Balance -->
    <div class="wallet-badge">
      📱 Data Wallet: <span class="bal" id="dataWalletBal">Loading…</span>
    </div>

    <!-- ✅ History button now links directly to history.html -->
    <a href="history.html" class="history-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
        <path d="M3 3v5h5" />
        <path d="M12 7v5l4 2" />
      </svg>
      History
    </a>

    <!-- REDEMPTION CARD -->
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">New redemption</div>
          <div class="card-desc">Select network, enter phone number, and specify<br>MB to redeem.</div>
        </div>
        <div class="phone-icon-btn">
          <svg width="18" height="20" viewBox="0 0 18 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="1" width="14" height="18" rx="2" stroke="#e0e6f0" stroke-width="1.5" />
            <circle cx="9" cy="16" r="1" fill="#e0e6f0" />
            <rect x="6" y="3.5" width="6" height="1" rx="0.5" fill="#e0e6f0" />
          </svg>
        </div>

      <!-- Phone number -->
      <div class="form-group">
        <label class="form-label">Phone number</label>
        <div class="phone-row">
          <div class="phone-prefix">+234</div>
          <input type="tel" class="phone-input" id="phoneInput" placeholder="8031234567" maxlength="11" inputmode="numeric" />
        </div>
      </div>

      <!-- Network provider -->
      <div class="form-group">
        <label class="form-label">Network provider</label>
        <div class="select-wrapper">
          <select class="form-select placeholder-active" id="networkSelect">
            <option value="" disabled selected hidden>Select a network</option>

            <option value="Airtel">Airtel</option>
            <option value="Glo">Glo</option>

          <span class="select-arrow">

      <!-- Data amount -->
      <div class="form-group">
        <label class="form-label">Data amount (MB)</label>
        <input type="number" class="form-input" id="dataAmount" placeholder="e.g. 500" min="1" inputmode="numeric" />

      <!-- Cost Preview -->
      <div class="cost-preview">
        <span class="cost-label">Estimated Cost (₦20/MB)</span>
        <span class="cost-value placeholder" id="costPreview">—</span>
      </div>

      <!-- Submit -->
      <button class="submit-btn" id="submitBtn" onclick="submitRedemption()">
        Submit for approval
      </button>
      <p class="admin-note">Admin will review and process your request.</p>
    </div>
  </div>

  <!-- WhatsApp FAB -->
  <a href="https://wa.me/2348000000000" target="_blank" rel="noopener" class="wa-fab" aria-label="Chat on WhatsApp">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M20.52 3.48A11.93 11.93 0 0 0 12 0C5.37 0 0 5.37 0 12c0 2.12.56 4.18 1.62 6L0 24l6.18-1.62A11.94 11.94 0 0 0 12 24c6.63 0 12-5.37 12-12 0-3.19-1.25-6.2-3.48-8.52zM12 22c-1.85 0-3.67-.5-5.24-1.44l-.38-.22-3.9 1.02 1.04-3.8-.25-.4A9.93 9.93 0 0 1 2 12C2 6.48 6.48 2 12 2c2.66 0 5.16 1.04 7.04 2.92A9.93 9.93 0 0 1 22 12c0 5.52-4.48 10-10 10zm5.47-7.34c-.3-.15-1.77-.87-2.04-.97s-.47-.15-.67.15-.77.97-.94 1.17-.35.22-.65.07a8.16 8.16 0 0 1-2.4-1.48 9.02 9.02 0 0 1-1.66-2.07c-.17-.3-.02-.46.13-.61.13-.13.3-.35.45-.52s.2-.3.3-.5.05-.37-.02-.52-.67-1.62-.92-2.22c-.24-.58-.49-.5-.67-.51h-.57c-.2 0-.52.07-.79.37s-1.04 1.02-1.04 2.48 1.07 2.88 1.22 3.08c.15.2 2.1 3.2 5.08 4.49.71.31 1.27.5 1.7.64.72.23 1.37.2 1.89.12.58-.09 1.77-.72 2.02-1.42.25-.7.25-1.3.17-1.42-.07-.12-.27-.2-.57-.35z" />
    </svg>
  </a>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- ── FIREBASE ── -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore,
      collection,
      addDoc,
      serverTimestamp,
      doc,
      getDoc,
      runTransaction
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // ── Config ──
    const firebaseConfig = {
      apiKey: "AIzaSyBTkls-WbffHErGeX9bMYPpV5pqbCe14gY",
      authDomain: "datacash-104dd.firebaseapp.com",
      projectId: "datacash-104dd",
      storageBucket: "datacash-104dd.firebasestorage.app",
      messagingSenderId: "101692098149",
      appId: "1:101692098149:web:55ccc9f1f105647488a88c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let userData = null;

    // ── Auth state ──
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        const initials = user.displayName ?
          user.displayName.split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2) :
          (user.email || "U").slice(0, 2).toUpperCase();
        document.getElementById("avatarBtn").textContent = initials;
        await fetchUserData();
      } else {
        showToast("Please sign in to redeem data.", "error");
        setTimeout(() => window.location.href = 'login.html', 2000);
      }
    });

    // ── Fetch user data ──
    async function fetchUserData() {
      if (!currentUser) return;
      try {
        const snap = await getDoc(doc(db, "users", currentUser.uid));
        if (snap.exists()) {
          userData = snap.data();
          updateDataWallet();
        }
      } catch (err) {
        console.error("Fetch user error:", err);
        document.getElementById("dataWalletBal").textContent = "Error";
      }
    }

    // ── Update data wallet display ──
    function updateDataWallet() {
      const mb = userData?.dataMB || 0;
      document.getElementById("dataWalletBal").textContent = `${mb.toLocaleString("en-NG")} MB`;
    }

    // ─── Format ───────────────────────────────────────────
    function fmt(n) {
      return Number(n || 0).toLocaleString("en-NG");
    }

    // ── Show toast ──
    function showToast(msg, type = "info") {
      const t = document.getElementById("toast");
      const icon = type === "success" ? "✅" : type === "error" ? "❌" : "ℹ️";
      t.innerHTML = `${icon} ${msg}`;
      t.className = `toast show ${type}`;
      setTimeout(() => { t.className = "toast"; }, 3500);
    }

    // ── Cost calculator ──
    document.getElementById("dataAmount").addEventListener("input", function() {
      const mb = parseInt(this.value);
      const costPreview = document.getElementById("costPreview");
      if (!mb || mb < 1) {
        costPreview.textContent = "—";
        costPreview.className = "cost-value placeholder";
        return;
      }
      const cost = mb * 20;
      costPreview.textContent = `₦${fmt(cost)}`;
      costPreview.className = "cost-value";
    });

    // ── Phone: digits only ──
    document.getElementById("phoneInput").addEventListener("input", function() {
      this.value = this.value.replace(/\D/g, "");
    });

    // ── Network select placeholder styling ──
    document.getElementById("networkSelect").addEventListener("change", function() {
      this.classList.remove("placeholder-active");
    });

    // ── Submit redemption ──
    window.submitRedemption = async function() {
      const phone = document.getElementById("phoneInput").value.trim();
      const network = document.getElementById("networkSelect").value;
      const amount = parseInt(document.getElementById("dataAmount").value.trim());
      const btn = document.getElementById("submitBtn");

      // Basic validation
      if (!phone || phone.length < 10) {
        showToast("Enter a valid 10-digit phone number.", "error");
        return;
      }
      if (!network) {
        showToast("Please select a network provider.", "error");
        return;
      }
      if (!amount || amount < 1) {
        showToast("Enter a valid data amount in MB.", "error");
        return;
      }

      // Check auth
      if (!currentUser) {
        showToast("Please log in to submit a request.", "error");
        return;
      }

      // Check data balance
      const currentMB = userData?.dataMB || 0;
      if (amount > currentMB) {
        showToast(`Insufficient data balance. You have ${fmt(currentMB)} MB.`, "error");
        return;
      }

      const cost = amount * 20;

      // Loading state
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Submitting…';

      try {
        // Deduct data balance using transaction
        const userRef = doc(db, "users", currentUser.uid);
        await runTransaction(db, async (transaction) => {
          const docSnap = await transaction.get(userRef);
          if (!docSnap.exists()) throw new Error("User profile not found.");
          const data = docSnap.data();
          const currentDataMB = data.dataMB || 0;
          if (currentDataMB < amount) {
            throw new Error(`Insufficient data balance. You have ${fmt(currentDataMB)} MB.`);
          }
          transaction.update(userRef, {
            dataMB: currentDataMB - amount,
            updatedAt: serverTimestamp(),
          });
        });

        // Save redemption request
        await addDoc(collection(db, "redemptionRequests"), {
          uid: currentUser.uid,
          userEmail: currentUser.email,
          displayName: currentUser.displayName || "",
          phone: "+234" + phone,
          network: network,
          dataMB: amount,
          cost: cost,
          status: "pending",
          createdAt: serverTimestamp(),
          adminNote: "",
        });

        // ✅ Also save to transactions collection for history page
        await addDoc(collection(db, "transactions"), {
          uid: currentUser.uid,
          type: "Data",
          amount: cost,
          dataAmount: amount,
          network: network,
          phone: "+234" + phone,
          method: "Data Redemption",
          status: "Initiated",
          createdAt: serverTimestamp(),
        });

        // Refresh user data
        await fetchUserData();

        showToast("✅ Request submitted! Redirecting to history…", "success");

        // Reset form
        document.getElementById("phoneInput").value = "";
        document.getElementById("networkSelect").value = "";
        document.getElementById("networkSelect").classList.add("placeholder-active");
        document.getElementById("dataAmount").value = "";
        document.getElementById("costPreview").textContent = "—";
        document.getElementById("costPreview").className = "cost-value placeholder";

        // Auto-redirect to history after 2.5 seconds
        setTimeout(() => {
          window.location.href = "history.html";
        }, 2500);

      } catch (err) {
        console.error(err);
        showToast(err.message || "Failed to submit. Try again.", "error");
      } finally {
        btn.disabled = false;
        btn.innerHTML = "Submit for approval";
      }
    };
  </script>
</body>
</html>
