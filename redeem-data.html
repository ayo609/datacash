<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Redeem Data – DataCash</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1b2a;
      color: #e0e6f0;
      min-height: 100vh;
    }

    /* ── TOP NAV ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: #0d1b2a;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .menu-btn {
      background: #1a2c40;
      border: none;
      color: #e0e6f0;
      width: 40px; height: 40px;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .notif-btn {
      position: relative;
      background: #1a2c40;
      border: none;
      color: #e0e6f0;
      width: 40px; height: 40px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .notif-badge {
      position: absolute;
      top: -2px; right: -2px;
      background: #2196f3;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      width: 18px; height: 18px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .avatar-btn {
      background: #1a3a5c;
      border: none;
      color: #e0e6f0;
      width: 40px; height: 40px;
      border-radius: 50%;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      letter-spacing: 0.5px;
    }

    /* ── PAGE BODY ── */
    .page {
      padding: 24px 18px 100px;
      max-width: 480px;
      margin: 0 auto;
    }

    h1 {
      font-size: 26px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 6px;
    }
    .page-subtitle {
      font-size: 13.5px;
      color: #8a9bb0;
      line-height: 1.5;
      margin-bottom: 20px;
    }

    /* ── HISTORY BUTTON ── */
    .history-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #1a2c40;
      border: none;
      color: #e0e6f0;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 30px;
      cursor: pointer;
      margin-bottom: 24px;
      transition: background 0.2s;
    }
    .history-btn:hover { background: #1e3450; }
    .history-btn svg { width: 18px; height: 18px; }

    /* ── CARD ── */
    .card {
      background: #112236;
      border-radius: 18px;
      padding: 24px 20px;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
    }
    .card-title {
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }
    .card-desc {
      font-size: 12.5px;
      color: #8a9bb0;
      line-height: 1.5;
    }
    .phone-icon-btn {
      background: #1a3450;
      border: none;
      color: #e0e6f0;
      width: 42px; height: 42px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    /* ── FORM ── */
    .form-group { margin-bottom: 20px; }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #c5d0de;
      margin-bottom: 8px;
    }

    /* Phone number field */
    .phone-row {
      display: flex;
      gap: 0;
      background: #0d1b2a;
      border-radius: 12px;
      overflow: hidden;
    }
    .phone-prefix {
      background: #1a2c40;
      color: #e0e6f0;
      font-size: 14px;
      font-weight: 600;
      padding: 14px 16px;
      border: none;
      border-radius: 12px 0 0 12px;
      white-space: nowrap;
    }
    .phone-input {
      flex: 1;
      background: #0d1b2a;
      border: 1px solid #1e3450;
      border-left: none;
      color: #e0e6f0;
      font-size: 14px;
      padding: 14px 14px;
      border-radius: 0 12px 12px 0;
      outline: none;
      transition: border-color 0.2s;
    }
    .phone-input::placeholder { color: #4a6080; }
    .phone-input:focus { border-color: #2196f3; }

    /* Select */
    .select-wrapper {
      position: relative;
    }
    .form-select {
      width: 100%;
      background: #0d1b2a;
      border: 1px solid #1e3450;
      color: #e0e6f0;
      font-size: 14px;
      padding: 14px 40px 14px 14px;
      border-radius: 12px;
      outline: none;
      appearance: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .form-select:focus { border-color: #2196f3; }
    .form-select option { background: #112236; }
    .form-select.placeholder-active { color: #4a6080; }
    .select-arrow {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: #8a9bb0;
    }

    /* Text input */
    .form-input {
      width: 100%;
      background: #0d1b2a;
      border: 1px solid #1e3450;
      color: #e0e6f0;
      font-size: 14px;
      padding: 14px 14px;
      border-radius: 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input::placeholder { color: #4a6080; }
    .form-input:focus { border-color: #2196f3; }

    /* Submit button */
    .submit-btn {
      width: 100%;
      background: #2196f3;
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      padding: 16px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
    }
    .submit-btn:hover { background: #1976d2; }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { background: #1a3450; color: #4a6080; cursor: not-allowed; }

    .admin-note {
      text-align: center;
      font-size: 12px;
      color: #4a6080;
      margin-top: 14px;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a2c40;
      color: #e0e6f0;
      padding: 13px 22px;
      border-radius: 30px;
      font-size: 13.5px;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 999;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast.success { border-left: 4px solid #22c55e; }
    .toast.error   { border-left: 4px solid #ef4444; }
    .toast.info    { border-left: 4px solid #2196f3; }

    /* ── HISTORY MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      align-items: flex-end;
    }
    .modal-overlay.open { display: flex; }
    .modal-sheet {
      background: #112236;
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      padding: 20px 18px 40px;
    }
    .modal-handle {
      width: 40px; height: 4px;
      background: #1e3450;
      border-radius: 2px;
      margin: 0 auto 20px;
    }
    .modal-title {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 16px;
    }
    .history-item {
      background: #0d1b2a;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .history-item-left .hi-network {
      font-size: 12px;
      color: #8a9bb0;
      margin-bottom: 2px;
    }
    .history-item-left .hi-phone {
      font-size: 14px;
      font-weight: 600;
      color: #e0e6f0;
    }
    .history-item-right { text-align: right; }
    .history-item-right .hi-amount {
      font-size: 14px;
      font-weight: 700;
      color: #2196f3;
      margin-bottom: 4px;
    }
    .status-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .status-pending  { background: #2a1f00; color: #f59e0b; }
    .status-approved { background: #0a2a14; color: #22c55e; }
    .status-rejected { background: #2a0a0a; color: #ef4444; }
    .empty-history {
      text-align: center;
      padding: 40px 0;
      color: #4a6080;
      font-size: 14px;
    }
    .modal-close-btn {
      width: 100%;
      margin-top: 16px;
      background: #1a2c40;
      color: #e0e6f0;
      border: none;
      border-radius: 12px;
      padding: 13px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    /* WhatsApp FAB */
    .wa-fab {
      position: fixed;
      bottom: 24px;
      right: 20px;
      width: 52px; height: 52px;
      background: #25d366;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(37,211,102,0.4);
      z-index: 150;
    }
    .wa-fab svg { width: 28px; height: 28px; fill: #fff; }

    /* Loading spinner inside button */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- TOP NAV -->
<div class="topbar">
  <div class="topbar-left">
    <button class="menu-btn">
      <svg width="18" height="14" viewBox="0 0 18 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="18" height="2" rx="1" fill="#e0e6f0"/>
        <rect y="6" width="12" height="2" rx="1" fill="#e0e6f0"/>
        <rect y="12" width="16" height="2" rx="1" fill="#e0e6f0"/>
      </svg>
    </button>
  </div>
  <div class="topbar-right">
    <button class="notif-btn">
      🔔
      <span class="notif-badge">2</span>
    </button>
    <button class="avatar-btn" id="avatarBtn">AO</button>
  </div>
</div>

<!-- PAGE -->
<div class="page">
  <h1>Redeem data</h1>
  <p class="page-subtitle">Redeem from your Free Data Wallet. Requests require admin approval.</p>

  <button class="history-btn" id="historyBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
      <path d="M3 3v5h5"/>
      <path d="M12 7v5l4 2"/>
    </svg>
    History
  </button>

  <!-- REDEMPTION CARD -->
  <div class="card">
    <div class="card-header">
      <div>
        <div class="card-title">New redemption</div>
        <div class="card-desc">Select network, enter phone number, and specify<br>MB to redeem.</div>
      </div>
      <div class="phone-icon-btn">
        <svg width="18" height="20" viewBox="0 0 18 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="1" width="14" height="18" rx="2" stroke="#e0e6f0" stroke-width="1.5"/>
          <circle cx="9" cy="16" r="1" fill="#e0e6f0"/>
          <rect x="6" y="3.5" width="6" height="1" rx="0.5" fill="#e0e6f0"/>
        </svg>
      </div>
    </div>

    <!-- Phone number -->
    <div class="form-group">
      <label class="form-label">Phone number</label>
      <div class="phone-row">
        <div class="phone-prefix">+234</div>
        <input
          type="tel"
          class="phone-input"
          id="phoneInput"
          placeholder="8031234567"
          maxlength="11"
          inputmode="numeric"
        />
      </div>
    </div>

    <!-- Network provider -->
    <div class="form-group">
      <label class="form-label">Network provider</label>
      <div class="select-wrapper">
        <select class="form-select placeholder-active" id="networkSelect">
          <option value="" disabled selected hidden>Select a network</option>
          <option value="MTN">MTN</option>
          <option value="Airtel">Airtel</option>
          <option value="Glo">Glo</option>
          <option value="9mobile">9mobile</option>
        </select>
        <span class="select-arrow">
          <svg width="14" height="8" viewBox="0 0 14 8" fill="none">
            <path d="M1 1l6 6 6-6" stroke="#8a9bb0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
      </div>
    </div>

    <!-- Data amount -->
    <div class="form-group">
      <label class="form-label">Data amount (MB)</label>
      <input
        type="number"
        class="form-input"
        id="dataAmount"
        placeholder="e.g. 500"
        min="1"
        inputmode="numeric"
      />
    </div>

    <!-- Submit -->
    <button class="submit-btn" id="submitBtn" onclick="submitRedemption()">
      Submit for approval
    </button>
    <p class="admin-note">Admin will review and process your request.</p>
  </div>
</div>

<!-- WhatsApp FAB -->
<button class="wa-fab" onclick="window.open('https://wa.me/', '_blank')">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M20.52 3.48A11.93 11.93 0 0 0 12 0C5.37 0 0 5.37 0 12c0 2.12.56 4.18 1.62 6L0 24l6.18-1.62A11.94 11.94 0 0 0 12 24c6.63 0 12-5.37 12-12 0-3.19-1.25-6.2-3.48-8.52zM12 22c-1.85 0-3.67-.5-5.24-1.44l-.38-.22-3.9 1.02 1.04-3.8-.25-.4A9.93 9.93 0 0 1 2 12C2 6.48 6.48 2 12 2c2.66 0 5.16 1.04 7.04 2.92A9.93 9.93 0 0 1 22 12c0 5.52-4.48 10-10 10zm5.47-7.34c-.3-.15-1.77-.87-2.04-.97s-.47-.15-.67.15-.77.97-.94 1.17-.35.22-.65.07a8.16 8.16 0 0 1-2.4-1.48 9.02 9.02 0 0 1-1.66-2.07c-.17-.3-.02-.46.13-.61.13-.13.3-.35.45-.52s.2-.3.3-.5.05-.37-.02-.52-.67-1.62-.92-2.22c-.24-.58-.49-.5-.67-.51h-.57c-.2 0-.52.07-.79.37s-1.04 1.02-1.04 2.48 1.07 2.88 1.22 3.08c.15.2 2.1 3.2 5.08 4.49.71.31 1.27.5 1.7.64.72.23 1.37.2 1.89.12.58-.09 1.77-.72 2.02-1.42.25-.7.25-1.3.17-1.42-.07-.12-.27-.2-.57-.35z"/>
  </svg>
</button>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- HISTORY MODAL -->
<div class="modal-overlay" id="historyModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Redemption History</div>
    <div id="historyList"><div class="empty-history">Loading history…</div></div>
    <button class="modal-close-btn" onclick="closeHistory()">Close</button>
  </div>
</div>

<!-- ── FIREBASE ── -->
<script type="module">
  import { initializeApp }       from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged }
                                  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import {
    getFirestore,
    collection,
    addDoc,
    query,
    where,
    orderBy,
    getDocs,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ── Config ──
  const firebaseConfig = {
    apiKey:            "AIzaSyBTkls-WbffHErGeX9bMYPpV5pqbCe14gY",
    authDomain:        "datacash-104dd.firebaseapp.com",
    projectId:         "datacash-104dd",
    storageBucket:     "datacash-104dd.firebasestorage.app",
    messagingSenderId: "101692098149",
    appId:             "1:101692098149:web:55ccc9f1f105647488a88c"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  let currentUser = null;

  // ── Auth state ──
  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUser = user;
      // Set avatar initials from displayName or email
      const initials = user.displayName
        ? user.displayName.split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2)
        : user.email.slice(0, 2).toUpperCase();
      document.getElementById("avatarBtn").textContent = initials;
    } else {
      // Redirect to login if not authenticated
      // window.location.href = "/login.html";
    }
  });

  // ── Show toast ──
  function showToast(msg, type = "info") {
    const t = document.getElementById("toast");
    const icon = type === "success" ? "✅" : type === "error" ? "❌" : "ℹ️";
    t.innerHTML = `${icon} ${msg}`;
    t.className = `toast show ${type}`;
    setTimeout(() => { t.className = "toast"; }, 3500);
  }

  // ── Submit redemption ──
  window.submitRedemption = async function () {
    const phone   = document.getElementById("phoneInput").value.trim();
    const network = document.getElementById("networkSelect").value;
    const amount  = document.getElementById("dataAmount").value.trim();
    const btn     = document.getElementById("submitBtn");

    // Basic validation
    if (!phone || phone.length < 10) {
      showToast("Enter a valid 10-digit phone number.", "error"); return;
    }
    if (!network) {
      showToast("Please select a network provider.", "error"); return;
    }
    if (!amount || Number(amount) < 1) {
      showToast("Enter a valid data amount in MB.", "error"); return;
    }

    // Check auth
    if (!currentUser) {
      showToast("Please log in to submit a request.", "error"); return;
    }

    // Loading state
    btn.disabled = true;
    btn.innerHTML = `<span class="spinner"></span> Submitting…`;

    try {
      await addDoc(collection(db, "redemptionRequests"), {
        userId:      currentUser.uid,
        userEmail:   currentUser.email,
        displayName: currentUser.displayName || "",
        phone:       "+234" + phone,
        network:     network,
        dataMB:      Number(amount),
        status:      "pending",   // pending | approved | rejected
        createdAt:   serverTimestamp(),
        adminNote:   ""
      });

      showToast("Request submitted! Admin will process it soon.", "success");

      // Reset form
      document.getElementById("phoneInput").value = "";
      document.getElementById("networkSelect").value = "";
      document.getElementById("networkSelect").classList.add("placeholder-active");
      document.getElementById("dataAmount").value = "";

    } catch (err) {
      console.error(err);
      showToast("Failed to submit. Try again.", "error");
    } finally {
      btn.disabled = false;
      btn.innerHTML = "Submit for approval";
    }
  };

  // ── Network select placeholder styling ──
  document.getElementById("networkSelect").addEventListener("change", function () {
    this.classList.remove("placeholder-active");
  });

  // ── History ──
  window.openHistory = async function () {
    document.getElementById("historyModal").classList.add("open");

    if (!currentUser) {
      document.getElementById("historyList").innerHTML =
        `<div class="empty-history">Please log in to view history.</div>`;
      return;
    }

    document.getElementById("historyList").innerHTML =
      `<div class="empty-history">Loading…</div>`;

    try {
      const q = query(
        collection(db, "redemptionRequests"),
        where("userId", "==", currentUser.uid),
        orderBy("createdAt", "desc")
      );
      const snap = await getDocs(q);

      if (snap.empty) {
        document.getElementById("historyList").innerHTML =
          `<div class="empty-history">No redemption requests yet.</div>`;
        return;
      }

      let html = "";
      snap.forEach(doc => {
        const d = doc.data();
        const statusClass =
          d.status === "approved" ? "status-approved" :
          d.status === "rejected" ? "status-rejected" : "status-pending";
        const label =
          d.status === "approved" ? "Approved" :
          d.status === "rejected" ? "Rejected"  : "Pending";
        const date = d.createdAt?.toDate
          ? d.createdAt.toDate().toLocaleDateString("en-GB", { day:"numeric", month:"short", year:"numeric" })
          : "—";

        html += `
          <div class="history-item">
            <div class="history-item-left">
              <div class="hi-network">${d.network} &bull; ${date}</div>
              <div class="hi-phone">${d.phone}</div>
            </div>
            <div class="history-item-right">
              <div class="hi-amount">${d.dataMB} MB</div>
              <span class="status-badge ${statusClass}">${label}</span>
            </div>
          </div>`;
      });

      document.getElementById("historyList").innerHTML = html;
    } catch (err) {
      console.error(err);
      document.getElementById("historyList").innerHTML =
        `<div class="empty-history">Failed to load history.</div>`;
    }
  };

  window.closeHistory = function () {
    document.getElementById("historyModal").classList.remove("open");
  };

  // Bind history button
  document.getElementById("historyBtn").addEventListener("click", window.openHistory);

  // Close modal on overlay click
  document.getElementById("historyModal").addEventListener("click", function (e) {
    if (e.target === this) window.closeHistory();
  });
</script>
</body>
</html>
