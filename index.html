<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DataCash – Create Account</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background-color: #0a1628;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 36px 16px 60px;
    }

    /* ── Logo ── */
    .logo-wrap {
      margin-bottom: 28px;
      display: flex;
      justify-content: center;
    }
    .logo-wrap img {
      width: 110px;
      height: 110px;
      object-fit: contain;
      display: block;
    }

    /* ── Card ── */
    .card {
      background: #0f1e35;
      border-radius: 18px;
      padding: 30px 26px 34px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 40px rgba(0,0,0,.5);
    }
    .card h1 { font-size: 22px; font-weight: 700; margin-bottom: 5px; }
    .card .subtitle { font-size: 13px; color: #8a9ab5; margin-bottom: 24px; }

    /* ── Fields ── */
    .field-row { display: flex; gap: 12px; margin-bottom: 16px; }
    .field-group { display: flex; flex-direction: column; flex: 1; margin-bottom: 16px; }
    .field-row .field-group { margin-bottom: 0; }

    label { font-size: 13px; color: #c8d4e5; font-weight: 500; margin-bottom: 6px; }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="tel"] {
      width: 100%;
      background: #162033;
      border: 1px solid #1e2f4a;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      color: #fff;
      outline: none;
      transition: border-color .2s;
    }
    input::placeholder { color: #3d5070; }
    input:focus { border-color: #2d7aed; }

    /* ── Phone ── */
    .phone-wrap {
      display: flex;
      background: #162033;
      border: 1px solid #1e2f4a;
      border-radius: 10px;
      overflow: hidden;
      transition: border-color .2s;
    }
    .phone-wrap:focus-within { border-color: #2d7aed; }
    .phone-prefix {
      display: flex; align-items: center; justify-content: center;
      background: #0d1a2e; color: #fff; font-size: 14px; font-weight: 600;
      padding: 0 14px; border-right: 1px solid #1e2f4a;
      white-space: nowrap; min-width: 62px; user-select: none;
    }
    .phone-wrap input { flex: 1; border: none; border-radius: 0; background: transparent; padding: 12px 14px; }

    /* ── Password toggle ── */
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 44px; }
    .pw-toggle {
      position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; padding: 0;
      color: #5a7090; display: flex; align-items: center;
    }
    .pw-toggle:hover { color: #8a9ab5; }

    /* ── Button ── */
    .btn-submit {
      width: 100%; padding: 14px;
      background: #2d7aed; color: #fff;
      font-size: 15px; font-weight: 600;
      border: none; border-radius: 50px; cursor: pointer;
      margin-top: 6px; transition: background .2s, opacity .2s;
      letter-spacing: .3px;
    }
    .btn-submit:hover { background: #1a68d9; }
    .btn-submit:disabled { opacity: .65; cursor: not-allowed; }

    /* ── Sign-in link ── */
    .signin-link { text-align: center; margin-top: 18px; font-size: 13px; color: #8a9ab5; }
    .signin-link a { color: #fff; text-decoration: underline; font-weight: 500; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 26px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a2d4a; color: #fff;
      padding: 12px 22px; border-radius: 10px;
      font-size: 13.5px; box-shadow: 0 4px 20px rgba(0,0,0,.5);
      transition: transform .35s cubic-bezier(.34,1.56,.64,1), opacity .35s;
      opacity: 0; z-index: 999; text-align: center; max-width: 320px; width: 90%;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.success { border-left: 4px solid #22c55e; }
    .toast.error   { border-left: 4px solid #ef4444; }
    .toast.info    { border-left: 4px solid #2d7aed; }

    /* ── Field errors ── */
    .field-error { font-size: 11.5px; color: #ef4444; margin-top: 4px; display: none; }

    /* ── Spinner inside button ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
  </style>
</head>
<body>

  <!-- Logo -->
  <div class="logo-wrap">
    <img src="data.jpg" alt="DataCash" />
  </div>

  <!-- Card -->
  <div class="card">
    <h1>Create an account</h1>
    <p class="subtitle">Use a Nigerian phone number to register.</p>

    <form id="signupForm" novalidate>

      <!-- Name row -->
      <div class="field-row">
        <div class="field-group">
          <label for="firstName">First name</label>
          <input type="text" id="firstName" autocomplete="given-name" />
          <span class="field-error" id="err-firstName">Enter your first name.</span>
        </div>
        <div class="field-group">
          <label for="lastName">Last name</label>
          <input type="text" id="lastName" autocomplete="family-name" />
          <span class="field-error" id="err-lastName">Enter your last name.</span>
        </div>
      </div>

      <!-- Email -->
      <div class="field-group">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="email" />
        <span class="field-error" id="err-email">Enter a valid email address.</span>
      </div>

      <!-- Phone -->
      <div class="field-group">
        <label for="phone">Phone number</label>
        <div class="phone-wrap">
          <div class="phone-prefix">+234</div>
          <input type="tel" id="phone" placeholder="8012345678"
                 maxlength="11" inputmode="numeric" autocomplete="tel-national" />
        </div>
        <span class="field-error" id="err-phone">Enter a valid Nigerian phone number.</span>
      </div>

      <!-- Referral -->
      <div class="field-group">
        <label for="referral">Referral code (optional)</label>
        <input type="text" id="referral" autocomplete="off" />
      </div>

      <!-- Password -->
      <div class="field-group">
        <label for="password">Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" autocomplete="new-password" />
          <button type="button" class="pw-toggle" aria-label="Show/hide password"
                  onclick="togglePw('password',this)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="field-error" id="err-password">Password must be at least 6 characters.</span>
      </div>

      <!-- Confirm password -->
      <div class="field-group">
        <label for="confirmPw">Confirm password</label>
        <div class="pw-wrap">
          <input type="password" id="confirmPw"
                 placeholder="Re-type your password" autocomplete="new-password" />
          <button type="button" class="pw-toggle" aria-label="Show/hide password"
                  onclick="togglePw('confirmPw',this)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="field-error" id="err-confirmPw">Passwords do not match.</span>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">Create account</button>
    </form>

    <p class="signin-link">Already have an account? <a href="login.html">Sign in</a></p>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Firebase SDK (modular v10) — loaded only once, deferred -->
  <script type="module">
    import { initializeApp }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, updateProfile }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, setDoc, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    /* ─── Config ─────────────────────────────────────────── */
    const app = initializeApp({
      apiKey: "AIzaSyBTkls-WbffHErGeX9bMYPpV5pqbCe14gY",
      authDomain: "datacash-104dd.firebaseapp.com",
      projectId: "datacash-104dd",
      storageBucket: "datacash-104dd.firebasestorage.app",
      messagingSenderId: "101692098149",
      appId: "1:101692098149:web:55ccc9f1f105647488a88c"
    });
    const auth = getAuth(app);
    const db   = getFirestore(app);

    /* ─── Generate unique referral code ──────────────────── */
    function genRefCode(uid) {
      return uid.substring(0, 8).toUpperCase();
    }

    /* ─── Toast helper ───────────────────────────────────── */
    function toast(msg, type = "info") {
      const el = document.getElementById("toast");
      el.innerHTML = msg;
      el.className = `toast ${type} show`;
      clearTimeout(el._t);
      el._t = setTimeout(() => { el.className = "toast"; }, 4500);
    }

    /* ─── Field-error helper ─────────────────────────────── */
    function showErr(id) {
      const el = document.getElementById("err-" + id);
      if (el) el.style.display = "block";
    }
    function clearErrors() {
      document.querySelectorAll(".field-error").forEach(e => e.style.display = "none");
    }

    /* ─── Phone: digits only ─────────────────────────────── */
    document.getElementById("phone").addEventListener("input", function () {
      this.value = this.value.replace(/\D/g, "");
    });

    /* ─── Check referral validity (no extra read if empty) ── */
    async function resolveReferral(code) {
      if (!code) return null;
      // We store referralCode on each user doc; find by referralCode field
      const { collection, query, where, getDocs } = await import(
        "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"
      );
      const q = query(collection(db, "users"), where("referralCode", "==", code.toUpperCase()));
      const snap = await getDocs(q);
      if (snap.empty) return null;
      return snap.docs[0].id; // referrer uid
    }

    /* ─── Form submit ────────────────────────────────────── */
    document.getElementById("signupForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      clearErrors();

      const firstName = document.getElementById("firstName").value.trim();
      const lastName  = document.getElementById("lastName").value.trim();
      const email     = document.getElementById("email").value.trim().toLowerCase();
      const phone     = document.getElementById("phone").value.trim();
      const referral  = document.getElementById("referral").value.trim().toUpperCase();
      const password  = document.getElementById("password").value;
      const confirmPw = document.getElementById("confirmPw").value;

      /* Client-side validation */
      let ok = true;
      if (!firstName)                                    { showErr("firstName"); ok = false; }
      if (!lastName)                                     { showErr("lastName");  ok = false; }
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email))
                                                         { showErr("email");     ok = false; }
      if (!phone || phone.length < 10)                   { showErr("phone");     ok = false; }
      if (password.length < 6)                           { showErr("password");  ok = false; }
      if (password !== confirmPw)                        { showErr("confirmPw"); ok = false; }
      if (!ok) return;

      /* Disable button + spinner */
      const btn = document.getElementById("submitBtn");
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Creating account…';

      try {
        /* 1. Create Firebase Auth user */
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        const uid  = cred.user.uid;

        /* 2. Set display name */
        await updateProfile(cred.user, { displayName: `${firstName} ${lastName}` });

        /* 3. Resolve referral (single Firestore read, only if code provided) */
        let referredBy = null;
        if (referral) {
          referredBy = await resolveReferral(referral);
          if (!referredBy) {
            toast("⚠️ Referral code not found – account created without it.", "info");
          }
        }

        /* 4. Build the user document (wallet + role + all fields) */
        const myRefCode = genRefCode(uid);
        const now       = serverTimestamp();

        const userDoc = {
          /* Identity */
          uid,
          firstName,
          lastName,
          fullName: `${firstName} ${lastName}`,
          email,
          phone: "+234" + phone,
          photoURL: null,
          role: "user",            // roles: user | admin | superadmin
          status: "active",        // active | suspended | banned

          /* Wallet */
          wallet: {
            balance: 0,            // main balance (NGN)
            bonus: 0,              // referral / promo bonus
            totalDeposited: 0,
            totalWithdrawn: 0,
            totalEarned: 0,
          },

          /* Referral */
          referralCode: myRefCode,
          referredBy: referredBy,  // uid of referrer, or null
          referralCount: 0,
          referralEarnings: 0,

          /* KYC */
          kyc: {
            verified: false,
            bvn: null,
            nin: null,
            submittedAt: null,
          },

          /* Notification settings */
          notifications: {
            email: true,
            sms: false,
            push: true,
          },

          /* Timestamps */
          createdAt: now,
          lastLoginAt: now,
          updatedAt: now,
        };

        /* 5. Write user doc — single write, no double charge */
        await setDoc(doc(db, "users", uid), userDoc);

        /* 6. Done */
        toast("✅ Account created! Redirecting…", "success");
        setTimeout(() => { window.location.href = "dashboard.html"; }, 2000);

      } catch (err) {
        btn.disabled = false;
        btn.textContent = "Create account";

        const MAP = {
          "auth/email-already-in-use": "This email is already registered. <a href='login.html' style='color:#93c5fd'>Sign in instead</a>.",
          "auth/invalid-email":        "The email address is not valid.",
          "auth/weak-password":        "Password is too weak. Use at least 6 characters.",
          "auth/network-request-failed":"Network error. Check your connection and retry.",
          "auth/too-many-requests":    "Too many attempts. Please wait a moment and try again.",
        };
        toast(MAP[err.code] || `Error: ${err.message}`, "error");
        console.error("[DataCash signup]", err.code, err.message);
      }
    });

    /* ─── Global password toggle ─────────────────────────── */
    window.togglePw = (id, btn) => {
      const inp = document.getElementById(id);
      const hide = inp.type === "password";
      inp.type = hide ? "text" : "password";
      btn.querySelector("svg").style.opacity = hide ? "0.35" : "1";
    };
  </script>
</body>
</html>
