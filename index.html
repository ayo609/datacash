<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <meta name="description" content="DataCash - Create your account" />
  <title>DataCash • Create account</title>
  <link rel="icon" href="data.jpg" type="image/jpeg" />

  <!-- Google Font: Plus Jakarta Sans (clean modern fintech look) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    /* ============================================
       CSS VARIABLES – exact palette from brief
       ============================================ */
    :root {
      --bg-primary: #031B3D;
      --bg-card: #06264D;
      --bg-input: #082F5D;
      --primary-blue: #1E90FF;
      --primary-blue-hover: #1a7de6;
      --text-primary: #FFFFFF;
      --text-secondary: #AEB9C8;
      --text-placeholder: #6B7D95;
      --border-color: rgba(255, 255, 255, 0.08);
      --border-color-hover: rgba(255, 255, 255, 0.15);
      --border-focus: rgba(30, 144, 255, 0.5);
      --error-red: #EF4444;
      --success-green: #10B981;
      --font-family: 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --transition-fast: 150ms ease;
      --transition-normal: 250ms ease;
      --transition-slow: 400ms ease;
    }

    /* ============================================
       RESET & BASE
       ============================================ */
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      height: 100%;
    }

    body {
      font-family: var(--font-family);
      background-color: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.5;
      padding: 24px 16px;
      animation: fadeIn 0.6s ease forwards;
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    button {
      cursor: pointer;
      border: none;
      background: none;
      font-family: inherit;
    }

    input {
      font-family: inherit;
    }

    .hidden {
      display: none !important;
    }

    /* ============================================
       TOAST NOTIFICATIONS
       ============================================ */
    .toast-container {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 12px;
      pointer-events: none;
    }

    .toast {
      pointer-events: all;
      min-width: 300px;
      max-width: 420px;
      padding: 16px 20px;
      border-radius: var(--radius-md);
      background: #0F2D5C;
      border: 1px solid var(--border-color);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      gap: 12px;
      animation: slideInRight 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .toast.removing {
      animation: slideOutRight 0.3s ease forwards;
    }

    .toast.success .toast-icon {
      color: var(--success-green);
    }

    .toast.error .toast-icon {
      color: var(--error-red);
    }

    .toast-icon {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
    }

    .toast-message {
      flex: 1;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-primary);
    }

    @keyframes slideInRight {
      from { transform: translateX(120%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes slideOutRight {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(120%); opacity: 0; }
    }

    /* ============================================
       MAIN WRAPPER
       ============================================ */
    .main-wrapper {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* ============================================
       REGISTRATION CONTAINER
       ============================================ */
    .registration-container {
      width: 100%;
      max-width: 480px;
      animation: fadeInUp 0.7s ease forwards;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ============================================
       LOGO
       ============================================ */
    .logo-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 28px;
    }

    .logo {
      width: 80px;
      height: auto;
      border-radius: var(--radius-sm);
    }

    /* ============================================
       CARD – dark blue, subtle border, soft shadow
       ============================================ */
    .card {
      background-color: var(--bg-card);
      border-radius: var(--radius-xl);
      border: 1px solid var(--border-color);
      padding: 36px 32px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 2px 8px rgba(0, 0, 0, 0.2);
      width: 100%;
    }

    /* ============================================
       CARD HEADER
       ============================================ */
    .card-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .card-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
      letter-spacing: -0.01em;
    }

    .card-subtitle {
      font-size: 0.875rem;
      color: var(--text-secondary);
      font-weight: 400;
    }

    /* ============================================
       FORM
       ============================================ */
    .registration-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .form-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-row-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .input-label {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.01em;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    /* ============================================
       FORM INPUTS – dark bg, thin border, white text
       ============================================ */
    .form-input {
      width: 100%;
      padding: 13px 16px;
      font-size: 0.875rem;
      font-weight: 400;
      color: var(--text-primary);
      background-color: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      outline: none;
      transition: border-color var(--transition-normal), box-shadow var(--transition-normal), background-color var(--transition-normal);
    }

    .form-input::placeholder {
      color: var(--text-placeholder);
      font-weight: 400;
    }

    .form-input:hover {
      border-color: var(--border-color-hover);
    }

    .form-input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(30, 144, 255, 0.15);
      background-color: #0A3568;
    }

    .form-input.error {
      border-color: var(--error-red);
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15);
    }

    .form-input.success {
      border-color: var(--success-green);
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
    }

    .input-wrapper .form-input {
      padding-right: 46px;
    }

    /* ============================================
       PHONE INPUT WITH +234 COUNTRY CODE
       ============================================ */
    .phone-input-wrapper {
      display: flex;
      align-items: stretch;
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid var(--border-color);
      background-color: var(--bg-input);
      transition: border-color var(--transition-normal), box-shadow var(--transition-normal);
    }

    .phone-input-wrapper:focus-within {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(30, 144, 255, 0.15);
    }

    .phone-input-wrapper.error {
      border-color: var(--error-red);
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15);
    }

    .phone-input-wrapper.success {
      border-color: var(--success-green);
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
    }

    .country-code {
      display: flex;
      align-items: center;
      padding: 13px 14px;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-primary);
      background-color: rgba(0, 0, 0, 0.2);
      border-right: 1px solid var(--border-color);
      white-space: nowrap;
      user-select: none;
    }

    .phone-input {
      flex: 1;
      border: none !important;
      background: transparent !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      padding: 13px 16px;
    }

    .phone-input:focus {
      box-shadow: none !important;
      background: transparent !important;
    }

    /* ============================================
       PASSWORD TOGGLE (eye icon)
       ============================================ */
    .password-toggle {
      position: absolute;
      right: 10px;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-placeholder);
      border-radius: 50%;
      transition: color var(--transition-fast), background-color var(--transition-fast);
      z-index: 1;
    }

    .password-toggle:hover {
      color: var(--text-primary);
      background-color: rgba(255, 255, 255, 0.06);
    }

    /* ============================================
       ERROR MESSAGES
       ============================================ */
    .error-message {
      font-size: 0.75rem;
      color: var(--error-red);
      min-height: 18px;
      font-weight: 400;
      opacity: 0;
      transform: translateY(-4px);
      transition: all 0.2s ease;
    }

    .error-message.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ============================================
       SUBMIT BUTTON – large, rounded, blue
       ============================================ */
    .submit-btn {
      position: relative;
      width: 100%;
      padding: 15px 24px;
      font-size: 0.95rem;
      font-weight: 600;
      color: #FFFFFF;
      background-color: var(--primary-blue);
      border: none;
      border-radius: var(--radius-lg);
      cursor: pointer;
      overflow: hidden;
      transition: background-color var(--transition-normal), transform 0.15s ease, box-shadow var(--transition-normal);
      margin-top: 8px;
      letter-spacing: 0.01em;
    }

    .submit-btn:hover {
      background-color: var(--primary-blue-hover);
      box-shadow: 0 6px 20px rgba(30, 144, 255, 0.35);
    }

    .submit-btn:active {
      transform: scale(0.98);
    }

    .submit-btn:disabled {
      cursor: not-allowed;
      opacity: 0.7;
      pointer-events: none;
    }

    .submit-btn.loading {
      pointer-events: none;
      opacity: 0.85;
    }

    .submit-btn.loading .btn-text {
      visibility: hidden;
    }

    .submit-btn.loading .btn-spinner {
      display: block;
    }

    .btn-text {
      position: relative;
      z-index: 1;
    }

    .btn-spinner {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2.5px solid rgba(255, 255, 255, 0.3);
      border-top-color: #FFFFFF;
      animation: spin 0.7s linear infinite;
      z-index: 1;
    }

    @keyframes spin {
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* Ripple effect on button click */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: scale(0);
      animation: rippleEffect 0.6s ease-out;
      pointer-events: none;
    }

    @keyframes rippleEffect {
      to { transform: scale(4); opacity: 0; }
    }

    /* ============================================
       BOTTOM TEXT
       ============================================ */
    .bottom-text {
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-top: 24px;
    }

    .signin-link {
      color: var(--primary-blue);
      font-weight: 600;
      text-decoration: underline;
      text-underline-offset: 3px;
      cursor: pointer;
      transition: color var(--transition-fast);
    }

    .signin-link:hover {
      color: #4da6ff;
    }

    /* ============================================
       RESPONSIVE – Tablet
       ============================================ */
    @media (max-width: 768px) {
      .registration-container {
        max-width: 440px;
      }
      .card {
        padding: 30px 24px;
      }
      .card-title {
        font-size: 1.35rem;
      }
      .form-row-split {
        gap: 12px;
      }
      .form-input {
        padding: 12px 14px;
        font-size: 0.85rem;
      }
      .country-code {
        padding: 12px 12px;
        font-size: 0.85rem;
      }
      .phone-input {
        padding: 12px 14px;
      }
      .submit-btn {
        padding: 14px 20px;
        font-size: 0.9rem;
      }
    }

    /* ============================================
       RESPONSIVE – Mobile
       ============================================ */
    @media (max-width: 480px) {
      body {
        padding: 16px 12px;
        align-items: flex-start;
        padding-top: 32px;
      }
      .registration-container {
        max-width: 100%;
      }
      .logo-wrapper {
        margin-bottom: 20px;
      }
      .logo {
        width: 64px;
      }
      .card {
        padding: 24px 16px;
        border-radius: var(--radius-lg);
      }
      .card-header {
        margin-bottom: 24px;
      }
      .card-title {
        font-size: 1.25rem;
      }
      .card-subtitle {
        font-size: 0.8rem;
      }
      .registration-form {
        gap: 16px;
      }
      .form-row-split {
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .form-input {
        padding: 11px 12px;
        font-size: 0.8rem;
        border-radius: var(--radius-md);
      }
      .input-wrapper .form-input {
        padding-right: 42px;
      }
      .country-code {
        padding: 11px 10px;
        font-size: 0.8rem;
      }
      .phone-input {
        padding: 11px 12px;
      }
      .password-toggle {
        right: 6px;
        width: 34px;
        height: 34px;
      }
      .password-toggle svg {
        width: 18px;
        height: 18px;
      }
      .submit-btn {
        padding: 13px 20px;
        font-size: 0.875rem;
        border-radius: var(--radius-md);
        margin-top: 4px;
      }
      .bottom-text {
        font-size: 0.8rem;
        margin-top: 18px;
      }
      .toast {
        min-width: auto;
        max-width: calc(100vw - 32px);
        padding: 14px 16px;
      }
    }

    @media (max-width: 360px) {
      .card {
        padding: 20px 12px;
      }
      .form-row-split {
        gap: 8px;
      }
      .form-input {
        padding: 10px 10px;
        font-size: 0.78rem;
      }
      .country-code {
        padding: 10px 8px;
        font-size: 0.78rem;
      }
      .phone-input {
        padding: 10px 10px;
      }
      .submit-btn {
        padding: 12px 16px;
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>
  <!-- TOAST CONTAINER -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- MAIN WRAPPER -->
  <main class="main-wrapper">
    <div class="registration-container">
      <!-- LOGO (top center) -->
      <div class="logo-wrapper">
        <img src="data.jpg" alt="DataCash logo" class="logo" />
      </div>

      <!-- CARD -->
      <div class="card">
        <!-- Header -->
        <div class="card-header">
          <h1 class="card-title">Create an account</h1>
          <p class="card-subtitle">Use a Nigerian phone number to register.</p>
        </div>

        <!-- Registration Form -->
        <form class="registration-form" id="registrationForm" novalidate>
          <!-- Row 1: First Name + Last Name -->
          <div class="form-row form-row-split">
            <div class="input-group">
              <label for="firstName" class="input-label">First Name</label>
              <input type="text" id="firstName" class="form-input" placeholder="First Name" autocomplete="given-name" required />
              <span class="error-message" id="firstNameError"></span>
            </div>
            <div class="input-group">
              <label for="lastName" class="input-label">Last Name</label>
              <input type="text" id="lastName" class="form-input" placeholder="Last Name" autocomplete="family-name" required />
              <span class="error-message" id="lastNameError"></span>
            </div>
          </div>

          <!-- Row 2: Email -->
          <div class="form-row">
            <div class="input-group">
              <label for="email" class="input-label">Email</label>
              <input type="email" id="email" class="form-input" placeholder="Enter your email" autocomplete="email" required />
              <span class="error-message" id="emailError"></span>
            </div>
          </div>

          <!-- Row 3: Phone Number with +234 prefix -->
          <div class="form-row">
            <div class="input-group">
              <label for="phone" class="input-label">Phone Number</label>
              <div class="phone-input-wrapper" id="phoneWrapper">
                <div class="country-code">+234</div>
                <input type="tel" id="phone" class="form-input phone-input" placeholder="Enter your phone number" autocomplete="tel" required />
              </div>
              <span class="error-message" id="phoneError"></span>
            </div>
          </div>

          <!-- Row 4: Referral Code (Optional) -->
          <div class="form-row">
            <div class="input-group">
              <label for="referralCode" class="input-label">Referral Code (Optional)</label>
              <input type="text" id="referralCode" class="form-input" value="O9JAX0FD" placeholder="Enter referral code" />
              <span class="error-message" id="referralCodeError"></span>
            </div>
          </div>

          <!-- Row 5: Password -->
          <div class="form-row">
            <div class="input-group">
              <label for="password" class="input-label">Password</label>
              <div class="input-wrapper">
                <input type="password" id="password" class="form-input" placeholder="Create a password" autocomplete="new-password" required />
                <button type="button" class="password-toggle" id="passwordToggle1" aria-label="Toggle password visibility" tabindex="-1">
                  <!-- Eye Open Icon -->
                  <svg id="eyeOpen1" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                  <!-- Eye Off Icon -->
                  <svg id="eyeOff1" class="hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path>
                    <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                  </svg>
                </button>
              </div>
              <span class="error-message" id="passwordError"></span>
            </div>
          </div>

          <!-- Row 6: Confirm Password -->
          <div class="form-row">
            <div class="input-group">
              <label for="confirmPassword" class="input-label">Confirm Password</label>
              <div class="input-wrapper">
                <input type="password" id="confirmPassword" class="form-input" placeholder="Confirm your password" autocomplete="new-password" required />
                <button type="button" class="password-toggle" id="passwordToggle2" aria-label="Toggle password visibility" tabindex="-1">
                  <!-- Eye Open Icon -->
                  <svg id="eyeOpen2" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                  <!-- Eye Off Icon -->
                  <svg id="eyeOff2" class="hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path>
                    <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                  </svg>
                </button>
              </div>
              <span class="error-message" id="confirmPasswordError"></span>
            </div>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="submit-btn" id="submitBtn">
            <span class="btn-text">Create account</span>
            <span class="btn-spinner"></span>
          </button>
        </form>

        <!-- Bottom text -->
        <p class="bottom-text">
          Already have an account?
          <a href="#" class="signin-link">Sign in</a>
        </p>
      </div>
    </div>
  </main>

  <!-- ==================== JAVASCRIPT ==================== -->
  <script>
    (function() {
      'use strict';

      // ---------- DOM ELEMENTS ----------
      const registrationForm = document.getElementById('registrationForm');
      const submitBtn = document.getElementById('submitBtn');
      const toastContainer = document.getElementById('toastContainer');

      const firstNameInput = document.getElementById('firstName');
      const lastNameInput = document.getElementById('lastName');
      const emailInput = document.getElementById('email');
      const phoneInput = document.getElementById('phone');
      const referralCodeInput = document.getElementById('referralCode');
      const passwordInput = document.getElementById('password');
      const confirmPasswordInput = document.getElementById('confirmPassword');

      const firstNameError = document.getElementById('firstNameError');
      const lastNameError = document.getElementById('lastNameError');
      const emailError = document.getElementById('emailError');
      const phoneError = document.getElementById('phoneError');
      const passwordError = document.getElementById('passwordError');
      const confirmPasswordError = document.getElementById('confirmPasswordError');

      const phoneWrapper = document.getElementById('phoneWrapper');

      // ---------- TOAST ----------
      function showToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;

        let iconSvg = '';
        if (type === 'success') {
          iconSvg = `<svg class="toast-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`;
        } else if (type === 'error') {
          iconSvg = `<svg class="toast-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>`;
        } else if (type === 'warning') {
          iconSvg = `<svg class="toast-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>`;
        }

        toast.innerHTML = `${iconSvg}<span class="toast-message">${message}</span>`;
        toast.addEventListener('click', () => removeToast(toast));
        toastContainer.appendChild(toast);

        setTimeout(() => removeToast(toast), 5000);
      }

      function removeToast(toast) {
        if (toast.classList.contains('removing')) return;
        toast.classList.add('removing');
        setTimeout(() => {
          if (toast.parentElement) toast.remove();
        }, 300);
      }

      // ---------- PASSWORD TOGGLE ----------
      function initPasswordToggle(toggleBtnId, inputId, eyeOpenId, eyeOffId) {
        const toggleBtn = document.getElementById(toggleBtnId);
        const input = document.getElementById(inputId);
        const eyeOpen = document.getElementById(eyeOpenId);
        const eyeOff = document.getElementById(eyeOffId);
        if (!toggleBtn || !input || !eyeOpen || !eyeOff) return;

        let visible = false;
        toggleBtn.addEventListener('click', (e) => {
          e.preventDefault();
          visible = !visible;
          input.type = visible ? 'text' : 'password';
          eyeOpen.classList.toggle('hidden', visible);
          eyeOff.classList.toggle('hidden', !visible);
        });
      }

      initPasswordToggle('passwordToggle1', 'password', 'eyeOpen1', 'eyeOff1');
      initPasswordToggle('passwordToggle2', 'confirmPassword', 'eyeOpen2', 'eyeOff2');

      // ---------- RIPPLE EFFECT ----------
      submitBtn.addEventListener('click', function(e) {
        const existing = this.querySelector('.ripple');
        if (existing) existing.remove();

        const ripple = document.createElement('span');
        ripple.className = 'ripple';
        const rect = this.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height);
        ripple.style.width = ripple.style.height = size + 'px';
        ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
        ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
        this.appendChild(ripple);
        ripple.addEventListener('animationend', () => ripple.remove());
      });

      // ---------- VALIDATION HELPERS ----------
      function showFieldError(input, errorEl, msg, wrapper = null) {
        input.classList.add('error');
        input.classList.remove('success');
        errorEl.textContent = msg;
        errorEl.classList.add('visible');
        if (wrapper) {
          wrapper.classList.add('error');
          wrapper.classList.remove('success');
        }
      }

      function showFieldSuccess(input, errorEl, wrapper = null) {
        input.classList.remove('error');
        input.classList.add('success');
        errorEl.textContent = '';
        errorEl.classList.remove('visible');
        if (wrapper) {
          wrapper.classList.remove('error');
          wrapper.classList.add('success');
        }
      }

      function clearField(input, errorEl, wrapper = null) {
        input.classList.remove('error', 'success');
        errorEl.textContent = '';
        errorEl.classList.remove('visible');
        if (wrapper) {
          wrapper.classList.remove('error', 'success');
        }
      }

      // ---------- REAL-TIME VALIDATION ----------
      firstNameInput.addEventListener('input', function() {
        const val = this.value.trim();
        if (val.length === 0) clearField(this, firstNameError);
        else if (val.length < 2) showFieldError(this, firstNameError, 'First name is too short');
        else showFieldSuccess(this, firstNameError);
      });

      lastNameInput.addEventListener('input', function() {
        const val = this.value.trim();
        if (val.length === 0) clearField(this, lastNameError);
        else if (val.length < 2) showFieldError(this, lastNameError, 'Last name is too short');
        else showFieldSuccess(this, lastNameError);
      });

      emailInput.addEventListener('input', function() {
        const val = this.value.trim();
        if (val.length === 0) clearField(this, emailError);
        else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) showFieldError(this, emailError, 'Please enter a valid email address');
        else showFieldSuccess(this, emailError);
      });

      phoneInput.addEventListener('input', function() {
        const raw = this.value.trim().replace(/\s/g, '');
        if (raw.length === 0) clearField(this, phoneError, phoneWrapper);
        else if (!/^\d{10,14}$/.test(raw)) showFieldError(this, phoneError, 'Please enter a valid Nigerian phone number', phoneWrapper);
        else showFieldSuccess(this, phoneError, phoneWrapper);
      });

      passwordInput.addEventListener('input', function() {
        const val = this.value;
        if (val.length === 0) clearField(this, passwordError);
        else if (val.length < 8) showFieldError(this, passwordError, 'Password must be at least 8 characters');
        else if (!/(?=.*[a-z])(?=.*[A-Z])(?=.*\d)/.test(val)) showFieldError(this, passwordError, 'Include uppercase, lowercase & number');
        else showFieldSuccess(this, passwordError);
        if (confirmPasswordInput.value.length > 0) validateConfirmPassword();
      });

      confirmPasswordInput.addEventListener('input', validateConfirmPassword);

      function validateConfirmPassword() {
        const val = confirmPasswordInput.value;
        const pw = passwordInput.value;
        if (val.length === 0) clearField(confirmPasswordInput, confirmPasswordError);
        else if (val !== pw) showFieldError(confirmPasswordInput, confirmPasswordError, 'Passwords do not match');
        else showFieldSuccess(confirmPasswordInput, confirmPasswordError);
      }

      // ---------- FULL VALIDATION ----------
      function validateForm() {
        let valid = true;
        const fn = firstNameInput.value.trim();
        if (fn.length < 2) { showFieldError(firstNameInput, firstNameError, 'First name is required'); valid = false; }
        else showFieldSuccess(firstNameInput, firstNameError);

        const ln = lastNameInput.value.trim();
        if (ln.length < 2) { showFieldError(lastNameInput, lastNameError, 'Last name is required'); valid = false; }
        else showFieldSuccess(lastNameInput, lastNameError);

        const em = emailInput.value.trim();
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em)) { showFieldError(emailInput, emailError, 'Please enter a valid email address'); valid = false; }
        else showFieldSuccess(emailInput, emailError);

        const ph = phoneInput.value.trim().replace(/\s/g, '');
        if (!/^\d{10,14}$/.test(ph)) { showFieldError(phoneInput, phoneError, 'Please enter a valid Nigerian phone number', phoneWrapper); valid = false; }
        else showFieldSuccess(phoneInput, phoneError, phoneWrapper);

        const pw = passwordInput.value;
        if (pw.length < 8) { showFieldError(passwordInput, passwordError, 'Password must be at least 8 characters'); valid = false; }
        else if (!/(?=.*[a-z])(?=.*[A-Z])(?=.*\d)/.test(pw)) { showFieldError(passwordInput, passwordError, 'Include uppercase, lowercase & number'); valid = false; }
        else showFieldSuccess(passwordInput, passwordError);

        const cpw = confirmPasswordInput.value;
        if (cpw.length === 0) { showFieldError(confirmPasswordInput, confirmPasswordError, 'Please confirm your password'); valid = false; }
        else if (cpw !== pw) { showFieldError(confirmPasswordInput, confirmPasswordError, 'Passwords do not match'); valid = false; }
        else showFieldSuccess(confirmPasswordInput, confirmPasswordError);

        return valid;
      }

      // ---------- FORM SUBMISSION ----------
      registrationForm.addEventListener('submit', function(e) {
        e.preventDefault();

        if (!validateForm()) {
          showToast('Please fix the errors in the form', 'error');
          const firstError = document.querySelector('.form-input.error');
          if (firstError) {
            firstError.scrollIntoView({ behavior: 'smooth', block: 'center' });
            firstError.focus();
          }
          return;
        }

        // --- Simulate loading / registration ---
        submitBtn.classList.add('loading');
        submitBtn.disabled = true;

        // (In a real app you would call Firebase here)
        setTimeout(() => {
          submitBtn.classList.remove('loading');
          submitBtn.disabled = false;
          showToast('Account created successfully! Welcome to DataCash 🎉', 'success');
          registrationForm.reset();
          // Clear all validation highlights
          document.querySelectorAll('.form-input').forEach(inp => inp.classList.remove('success', 'error'));
          document.querySelectorAll('.error-message').forEach(el => { el.textContent = ''; el.classList.remove('visible'); });
          if (phoneWrapper) phoneWrapper.classList.remove('error', 'success');
          // Restore referral code default
          if (referralCodeInput) referralCodeInput.value = 'O9JAX0FD';
        }, 1800);
      });

      // ---------- BOTTOM LINK (prevent real navigation) ----------
      document.querySelector('.signin-link').addEventListener('click', function(e) {
        e.preventDefault();
        showToast('Sign in page coming soon', 'warning');
      });

      console.log('✅ DataCash registration page ready');
    })();
  </script>
</body>
</html>
